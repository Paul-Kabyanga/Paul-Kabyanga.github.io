<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Orbiting and Spinning Sphere in A-Frame</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('orbit', {
        schema: {
          radius:  {type: 'number', default: 2},
          speed:   {type: 'number', default: 0.5},
          centerX: {type: 'number', default: 0},
          centerY: {type: 'number', default: 2},
          centerZ: {type: 'number', default: -5}
        },
        init: function () {
          this.angle = 0;
        },
        tick: function (time, timeDelta) {
          this.angle += this.data.speed * (timeDelta / 1000);
          this.el.object3D.position.x = this.data.centerX + this.data.radius * Math.cos(this.angle);
          this.el.object3D.position.y = this.data.centerY;
          this.el.object3D.position.z = this.data.centerZ + this.data.radius * Math.sin(this.angle);
        }
      });


      AFRAME.registerComponent('color-cycle', {
       schema: {
        colors: {type: 'array', default: ['orange', 'yellow', '#ff4500', '#ffcc00', '#ff6600']},
        speed:  {type: 'number', default: 2000}
       },
      init: function () {
       this.colorIndex = 0;
       this.lastSwitch = 0;
       },
        tick: function (time) {
       if (time - this.lastSwitch > this.data.speed) {
        this.colorIndex = (this.colorIndex + 1) % this.data.colors.length;
        let newColor = this.data.colors[this.colorIndex];
        this.el.setAttribute('material', 'color', newColor);
        this.el.setAttribute('material', 'emissive', newColor);
        this.lastSwitch = time;
       }
      }
     });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="earth" src="./IMAGES/1_earth_8k.jpg">
        <img id="fluid" src="./IMAGES/waternormals.jpg">
        <img id ="ven" src = "./IMAGES/1_earth_8k.jpg">
        <img id ="mars" src = "./IMAGES/1_earth_8k.jpg">
        <img id ="plan2" src = "./IMAGES/1_earth_8k.jpg">
        <img id ="plan3" src = "./IMAGES/1_earth_8k.jpg">
      </a-assets>

      <!-- Center Sun (fixed) -->
      <a-sphere id="sun"
                position="0 2 -5"
                radius="0.6"
                color-cycle="colors: orange, yellow, #ff4500, #ffcc00, #ff6600; speed: 2000"
                material="emissive: orange; emissiveIntensity: 0.5"></a-sphere>

      <!-- Orbiting Earth -->
      <a-sphere id="sphere"
                radius="0.3"
                src="#earth"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
                orbit="radius: 2; speed: 0.8; centerX: 0; centerY: 2; centerZ: -5"></a-sphere>


      <!-- Orbiting Planet 2-->
      <a-sphere id="planet2"
                radius="0.4"
                src="#mars"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 6000"
                orbit="radius: 2.7; speed: 0.5; centerX: 0; centerY: 2; centerZ: -5"></a-sphere>

         <!-- Orbiting Planet 3awq-->
      <a-sphere id="planet3"
                radius="0.55"
                src="#plan3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000"
                orbit="radius: 3.5; speed: 0.3; centerX: 0; centerY: 2; centerZ: -5"></a-sphere>

      <a-sphere id="planet4"
                radius="0.15"
                src = "#ven"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 2000"
                orbit="radius: 1.0; speed: 1.2; centerX: 0; centerY: 2; centerZ: -5"></a-sphere>

         


      <!-- Camera and Lighting -->
      <a-camera position="0 1.6 0"></a-camera>
      <a-light type="ambient" color="#888"></a-light>
      <a-light type="directional" color="#fff" position="-1 1 1"></a-light>

    </a-scene>
  </body>
</html>
